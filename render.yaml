services:
  - type: web
    name: jobseeking-agent
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install -r backend/requirements.txt
      playwright install chromium --with-deps
      cd frontend && npm ci && npm run build
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: NOTIFICATION_CHAT_ID
        sync: false
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_HOUR
        value: "9"
      - key: HIGH_SCORE_THRESHOLD
        value: "0.80"
      - key: MID_SCORE_THRESHOLD
        value: "0.70"
    disk:
      name: jobseeking-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
